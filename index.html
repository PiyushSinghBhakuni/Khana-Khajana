<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khana Khajana - Kitchen Inventory Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app" id="app">
    <!-- Initial loading screen -->
    <div class="pattern-header">
      <div class="brand">
        <div class="brand-title">🍽️ Khana Khajana</div>
        <div class="brand-sub">Kitchen Inventory Manager</div>
      </div>
    </div>
    <div class="main" style="display:flex;align-items:center;justify-content:center;min-height:60vh">
      <div style="text-align:center">
        <div class="spinner" style="width:32px;height:32px;border-width:4px;margin:0 auto 16px"></div>
        <div style="color:var(--text-muted);font-size:14px;font-weight:600">Connecting to cloud...</div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (v9 compat mode — works as plain scripts) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- App scripts — order matters -->
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
